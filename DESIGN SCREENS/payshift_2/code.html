<!DOCTYPE html><html dir="rtl" lang="he"><head>
<meta charset="utf-8">

                    "surface-container-lowest": "#ffffff",
                    "inverse-on-surface": "#eef0fc",
                    "on-primary": "#ffffff",
                    "surface-container": "#ecedf9",

                    "surface-container-high": "#e6e8f3",
                    "on-tertiary-container": "#fffbff",
                    "surface-container-low": "#f1f3fe",
                    "on-primary-fixed-variant": "#004493",
                    "on-secondary-fixed-variant": "#3e4850",
                    "tertiary-container": "#c64f00",
                    "surface-tint": "#005bc1",
                    "surface-container-highest": "#e0e2ed",

                    "primary-fixed": "#d8e2ff",
                    "surface-variant": "#e0e2ed",
                    "secondary": "#566068",
                    "inverse-primary": "#adc6ff",
                    "surface": "#f9f9ff",
                    "secondary-fixed-dim": "#bec8d1",
                    "primary-fixed-dim": "#adc6ff",
                    "surface-bright": "#f9f9ff",
                    "primary": "#0058bc",
                    "on-primary-container": "#fefcff",
                    "on-error-container": "#93000a",
                    "error": "#ba1a1a",
                    "on-background": "#181c23",

            "borderRadius": {
                    "DEFAULT": "0.25rem",

                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "16px",
                    "xs": "4px",
                    "md": "16px",
                    "lg": "24px",
                    "container-margin": "20px",
                    "xl": "32px",
                    "sm": "12px",
                    "base": "8px"
            },
            "fontFamily": {
                    "headline-lg-mobile": ["Manrope"],
                    "body-lg": ["Manrope"],
                    "headline-sm": ["Manrope"],
                    "label-lg": ["Manrope"],
                    "headline-md": ["Manrope"],
                    "headline-lg": ["Manrope"],
                    "body-md": ["Manrope"],
                    "label-sm": ["Manrope"]
            },

                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],

          },
        },
      }

<style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #f9f9ff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(224, 226, 237, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-md">
<!-- Background Decorative Element -->
<div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary-container/10 rounded-full blur-[100px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-secondary-container/20 rounded-full blur-[100px]"></div>
</div>
<main class="w-full max-w-[440px] flex flex-col gap-xl items-center animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Brand Identity Section -->
<div class="flex flex-col items-center gap-md">
<div class="w-16 h-16 rounded-xl bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<div class="text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary tracking-tight">
                    התחברות ל-PayShift
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">נהל את המשמרות והשכר שלך בקלות</p>
</div>
</div>
<!-- Login Card -->
<div class="glass-card w-full p-xl rounded-xl flex flex-col gap-lg shadow-sm">
<form class="flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant px-xs" for="email">אימייל</label>
<div class="relative group">
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-[52px] pr-[48px] pl-md bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-lg text-body-lg transition-all" dir="ltr" id="email" placeholder="example@domain.com" type="email">
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center px-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="password">סיסמה</label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">שכחת סיסמה?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-[52px] pr-[48px] pl-md bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-lg text-body-lg transition-all" dir="ltr" id="password" placeholder="••••••••" type="password">
<button class="absolute left-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center gap-sm px-xs mt-xs">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox">
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer select-none" for="remember">זכור אותי במכשיר זה</label>
</div>
<!-- Primary Login Button -->
<button class="w-full h-[52px] bg-primary text-on-primary font-label-lg text-label-lg rounded-xl shadow-md shadow-primary/20 hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-sm mt-md" type="submit">
<span>התחבר</span>
<span class="material-symbols-outlined text-[20px]">login</span>
</button>
</form>
<!-- Social Login Divider -->
<div class="relative flex items-center py-md">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-md text-on-surface-variant font-label-sm text-label-sm">או התחבר באמצעות</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm h-12 border border-outline-variant rounded-xl hover:bg-surface-container-low transition-colors font-label-lg text-label-lg">
<div class="w-5 h-5 flex items-center justify-center">
<img alt="Google" class="w-full h-full object-contain" data-alt="A clean vector icon of the Google logo with its signature four colors, set against a transparent background to represent a high-end, professional third-party authentication option in a modern corporate web application interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBxhgRVB-iTpRXTJ2kNmoLPS80o6N_W8-w-zXc4xT90SN9n6kEn4iBSM-dZVDjT2SFVNiqnp-TlHKYvPRPvNfZwY_wfIxVmQAJm04qDzPKOO9iEeHExmp5f3QKbLNBuFJW6O0gAhH3A7flOJtpJJoC9kI5VfnhnvVruclr--3K4MgaXkR1IpMs4Thk6m44x1zEiv2u3V4TTuh0UteidpxFW28fjy-sB1xhjxKosQtcpLtpXWGm2c0CH8ZPunePry6u1xBAPP3xAWec">
</div>
<span>Google</span>
</button>
<button class="flex items-center justify-center gap-sm h-12 border border-outline-variant rounded-xl hover:bg-surface-container-low transition-colors font-label-lg text-label-lg">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">apps</span>
<span>Apple</span>
</button>
</div>
</div>
<!-- Registration Link Footer -->
<div class="flex flex-col items-center gap-md">
<p class="font-body-md text-body-md text-on-surface-variant">
                אין לך חשבון? 
                <a class="text-primary font-label-lg text-label-lg hover:underline transition-all mr-xs" href="#">הרשם</a>
</p>
<!-- Language Switcher or Simple Link -->
<div class="flex gap-lg opacity-60">
<a class="font-label-sm text-label-sm hover:text-primary" href="#">תנאי שימוש</a>
<a class="font-label-sm text-label-sm hover:text-primary" href="#">מדיניות פרטיות</a>
<a class="font-label-sm text-label-sm hover:text-primary" href="#">תמיכה</a>
</div>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('ring-2', 'ring-primary-container/20');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('ring-2', 'ring-primary-container/20');
            });
        });

        // Simple button press animation
        const loginBtn = document.querySelector('button[type="submit"]');
        loginBtn.addEventListener('mousedown', () => loginBtn.classList.add('scale-95'));
        loginBtn.addEventListener('mouseup', () => loginBtn.classList.remove('scale-95'));
        loginBtn.addEventListener('mouseleave', () => loginBtn.classList.remove('scale-95'));
    </script>
</body></html>
