<!DOCTYPE html>
<html class="light" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Shift - PayShift</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#007BFF",
                    "light-blue": "#E9F5FF",
                    "card-bg-light": "#FFFFFF",
                    "card-bg-dark": "#1A1F30",
                    "background-light": "#F0F2F5",
                    "background-dark": "#0f1323",
                    "success": "#28A745",
                    "error": "#DC3545",
                    "charcoal": "#333333"
                },
                fontFamily: {
                    "display": ["Manrope", "Noto Sans Hebrew", "sans-serif"]
                },
                borderRadius: {
                    "DEFAULT": "0.75rem", // a bit more rounded for the square aesthetic
                    "lg": "1rem",
                    "xl": "1.25rem",
                    "full": "9999px"
                },
                boxShadow: {
                    'card': '0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05)',
                }
            },
        },
    }
</script>
<style>
    body {
        min-height: max(884px, 100dvh);
        background-color: #E9F5FF;
    }
    .dark body {
        background-color: #0f1323;
    }
    .form-input {
        background-color: transparent;
        border: none;
        padding: 0;
        text-align: right;
        font-size: 1.25rem;
        font-weight: 700;
        color: #007BFF;
    }
    .form-input::placeholder {
        color: #90b6d9;
        font-weight: 500;
    }
    .dark .form-input {
        color: #A3CFFF;
    }
    .dark .form-input::placeholder {
        color: #5A789A;
    }
    .form-input:focus {
        outline: none;
        ring-width: 0;
    }
    input[type="time"]::-webkit-calendar-picker-indicator {
        display: none;
    }
</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-light-blue dark:bg-background-dark font-display text-charcoal dark:text-white" dir="rtl">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="flex items-center bg-transparent p-4 pb-2 justify-between sticky top-0 z-10">
<div class="text-charcoal dark:text-white flex size-10 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-2xl">arrow_forward</span>
</div>
<h2 class="text-charcoal dark:text-white text-xl font-bold leading-tight tracking-[-0.015em] flex-1 text-center">הוספת משמרת</h2>
<div class="w-10"></div>
</div>
<main class="p-4 flex-1">
<div class="flex flex-col gap-4">
<div class="flex flex-col items-stretch justify-start rounded-xl bg-card-bg-light dark:bg-card-bg-dark shadow-card p-4">
<p class="text-charcoal dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">ברמן ב'קפה נואר'</p>
<div class="flex flex-col gap-1 mt-1">
<p class="text-gray-500 dark:text-gray-400 text-base font-normal leading-normal">שכר שעתי: ₪35.00</p>
<p class="text-gray-500 dark:text-gray-400 text-base font-normal leading-normal">שעות נוספות אחרי 8 שעות</p>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="col-span-2 bg-card-bg-light dark:bg-card-bg-dark shadow-card rounded-xl p-4 flex items-center justify-between">
<div class="flex flex-col">
<p class="text-gray-500 dark:text-gray-400 text-base font-medium leading-normal">תאריך</p>
<input class="form-input w-full" value="24/05/2024"/>
</div>
<span class="material-symbols-outlined text-3xl text-primary dark:text-blue-400">calendar_today</span>
</div>
<div class="bg-card-bg-light dark:bg-card-bg-dark shadow-card rounded-xl p-4 flex flex-col justify-between h-32">
<p class="text-gray-500 dark:text-gray-400 text-base font-medium leading-normal">שעת התחלה</p>
<input class="form-input w-full" type="time" value="09:00"/>
</div>
<div class="bg-card-bg-light dark:bg-card-bg-dark shadow-card rounded-xl p-4 flex flex-col justify-between h-32">
<p class="text-gray-500 dark:text-gray-400 text-base font-medium leading-normal">שעת סיום</p>
<input class="form-input w-full" type="time" value="18:30"/>
</div>
<div class="bg-card-bg-light dark:bg-card-bg-dark shadow-card rounded-xl p-4 flex flex-col justify-between h-32">
<p class="text-gray-500 dark:text-gray-400 text-base font-medium leading-normal">זמן הפסקה (דקות)</p>
<input class="form-input w-full" placeholder="0" type="number" value="60"/>
</div>
<div class="bg-card-bg-light dark:bg-card-bg-dark shadow-card rounded-xl p-4 flex flex-col justify-between h-32">
<p class="text-gray-500 dark:text-gray-400 text-base font-medium leading-normal">בונוסים</p>
<input class="form-input w-full" placeholder="₪0" type="number" value=""/>
</div>
<div class="col-span-2 bg-card-bg-light dark:bg-card-bg-dark shadow-card rounded-xl p-4">
<p class="text-gray-500 dark:text-gray-400 text-base font-medium leading-normal">הערות</p>
<textarea class="form-input text-base font-normal w-full mt-2 resize-none h-16" placeholder="הערות אופציונליות..."></textarea>
</div>
</div>
<div class="bg-primary/90 dark:bg-blue-600 p-4 rounded-xl flex flex-col gap-3 text-white shadow-lg">
<h3 class="text-lg font-bold">סיכום משמרת</h3>
<div class="grid grid-cols-3 gap-2 text-center">
<div class="flex flex-col items-center p-2 rounded-lg bg-white/20">
<p class="text-blue-100 text-sm font-medium">שעות נטו</p>
<p class="text-xl font-bold">8.5</p>
</div>
<div class="flex flex-col items-center p-2 rounded-lg bg-white/20">
<p class="text-blue-100 text-sm font-medium">שעות נוספות</p>
<p class="text-xl font-bold">0.5</p>
</div>
<div class="flex flex-col items-center p-2 rounded-lg bg-white/90 text-primary">
<p class="text-sm font-bold">סה"כ למשמרת</p>
<p class="text-xl font-extrabold">₪306.25</p>
</div>
</div>
</div>
</div>
</main>
<footer class="p-4 pt-2 sticky bottom-0 bg-light-blue dark:bg-background-dark">
<button class="w-full h-16 bg-card-bg-light dark:bg-card-bg-dark text-primary dark:text-blue-300 font-bold text-xl rounded-xl flex items-center justify-center shadow-card hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
שמור משמרת
</button>
</footer>
</div>

</body></html>
