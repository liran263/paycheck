<!DOCTYPE html>
<html class="light" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registration - PayShift</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#007BFF",
                        "background-light": "#F0F2F5",
                        "background-dark": "#0f1323",
                        "text-light": "#333333",
                        "text-dark": "#F0F2F5",
                        "success": "#28A745",
                        "error": "#DC3545",
                        "brand-blue-light": "#E3F2FD",
                        "brand-blue": "#42A5F5"
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-brand-blue-light dark:bg-background-dark font-display text-text-light dark:text-text-dark" dir="rtl">
<div class="relative flex min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="flex items-center bg-brand-blue-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<div class="flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-text-light dark:text-text-dark">arrow_forward</span>
</div>
<h1 class="text-2xl font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12 text-text-light dark:text-text-dark">הרשמה ל-PayShift</h1>
</div>
<main class="flex-1 px-4 py-6">
<form class="grid grid-cols-2 gap-4">
<div class="col-span-1 bg-white p-4 rounded-lg flex flex-col justify-center items-center">
<label class="w-full">
<input class="form-input w-full border-0 bg-transparent text-center text-lg font-medium placeholder:text-gray-400 focus:ring-0" placeholder="שם פרטי" type="text" value=""/>
</label>
</div>
<div class="col-span-1 bg-white p-4 rounded-lg flex flex-col justify-center items-center">
<label class="w-full">
<input class="form-input w-full border-0 bg-transparent text-center text-lg font-medium placeholder:text-gray-400 focus:ring-0" placeholder="שם משפחה" type="text" value=""/>
</label>
</div>
<div class="col-span-2 bg-white p-4 rounded-lg flex flex-col justify-center items-center relative">
<label class="w-full">
<input class="form-input w-full border-0 bg-transparent text-center text-lg font-medium placeholder:text-gray-400 focus:ring-0 pr-8" placeholder="שם משתמש" type="text" value="sampleuser"/>
</label>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-success">check_circle</span>
</div>
<div class="col-span-2 bg-white p-4 rounded-lg flex flex-col justify-center items-center relative">
<label class="w-full">
<input class="form-input w-full border-0 bg-transparent text-center text-lg font-medium placeholder:text-gray-400 focus:ring-0 pr-8" placeholder="אימייל" type="email" value="invalid-email"/>
</label>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-error">error</span>
<p class="text-error text-xs mt-1 absolute -bottom-5">כתובת אימייל לא תקינה</p>
</div>
<div class="col-span-2 bg-white p-4 rounded-lg flex flex-col justify-center items-center relative mt-2">
<label class="w-full">
<input class="form-input w-full border-0 bg-transparent text-center text-lg font-medium placeholder:text-gray-400 focus:ring-0 pr-8" placeholder="סיסמה" type="password" value=""/>
</label>
<button class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<div class="col-span-2 bg-white p-4 rounded-lg flex flex-col justify-center items-center relative">
<label class="w-full">
<input class="form-input w-full border-0 bg-transparent text-center text-lg font-medium placeholder:text-gray-400 focus:ring-0 pr-8" placeholder="אימות סיסמה" type="password" value=""/>
</label>
<button class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
<p class="text-error text-xs mt-1 absolute -bottom-5">הסיסמאות אינן תואמות</p>
</div>
<div class="col-span-2 pt-8">
<button class="w-full flex items-center justify-center bg-brand-blue text-white font-bold py-5 px-4 rounded-lg hover:bg-brand-blue/90 focus:outline-none focus:ring-2 focus:ring-brand-blue/50 focus:ring-offset-2 dark:focus:ring-offset-background-dark transition-colors duration-300" type="submit">
                        הרשמה
                    </button>
</div>
</form>
<div class="flex items-center justify-center pt-4 hidden">
<div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
</div>
<p class="text-center text-sm text-gray-600 dark:text-gray-400 pt-8">
                יש לך כבר חשבון? <a class="font-medium text-brand-blue hover:underline" href="#">התחבר</a>
</p>
</main>
</div>

</body></html>
