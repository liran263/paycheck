<!DOCTYPE html><html dir="rtl" lang="he"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#7c2e00",
                        "tertiary": "#9e3d00",
                        "surface-container": "#ecedf9",
                        "background": "#f9f9ff",
                        "on-primary-fixed": "#001a41",
                        "surface-container-high": "#e6e8f3",
                        "secondary-fixed": "#dae4ee",
                        "surface-bright": "#f9f9ff",
                        "inverse-surface": "#2d3039",
                        "surface-container-low": "#f1f3fe",
                        "secondary-container": "#dae4ee",
                        "on-primary-container": "#fefcff",
                        "surface-dim": "#d8d9e5",
                        "outline": "#717786",
                        "on-background": "#181c23",
                        "on-error": "#ffffff",
                        "primary": "#0058bc",
                        "primary-fixed": "#d8e2ff",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#3e4850",
                        "on-tertiary-container": "#fffbff",
                        "on-primary-fixed-variant": "#004493",
                        "primary-fixed-dim": "#adc6ff",
                        "tertiary-fixed-dim": "#ffb595",
                        "on-secondary-fixed": "#131d24",
                        "inverse-primary": "#adc6ff",
                        "surface-tint": "#005bc1",
                        "outline-variant": "#c1c6d7",
                        "surface-container-lowest": "#ffffff",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#ffdbcc",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "secondary": "#566068",
                        "on-tertiary-fixed": "#351000",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#eef0fc",
                        "surface-variant": "#e0e2ed",
                        "on-surface-variant": "#414755",
                        "surface-container-highest": "#e0e2ed",
                        "on-secondary-container": "#5c666e",
                        "tertiary-container": "#c64f00",
                        "surface": "#f9f9ff",
                        "primary-container": "#0070eb",
                        "on-surface": "#181c23"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "xl": "32px",
                        "md": "16px",
                        "xs": "4px",
                        "sm": "12px",
                        "lg": "24px",
                        "container-margin": "20px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "headline-sm": ["Manrope"],
                        "headline-lg": ["Manrope"],
                        "label-lg": ["Manrope"],
                        "label-sm": ["Manrope"]
                    },
                    "fontSize": {
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.04em", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .keypad-button:active {
            transform: scale(0.92);
            background-color: var(--surface-container-highest);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-start overflow-hidden">
<!-- Top AppBar (Mobile Style for Edit Screen) -->
<header class="fixed top-0 w-full z-50 bg-surface/70 backdrop-blur-lg border-b border-white/20 shadow-[0_8px_20px_rgba(0,64,255,0.04)] flex justify-between items-center px-gutter h-16">
<div class="flex items-center gap-3">
<button aria-label="Close" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-primary/10 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface">close</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold">עריכת הפסקות</h1>
</div>
<div class="w-10 h-10 bg-primary-container/10 rounded-full flex items-center justify-center">
<img alt="" class="w-6 h-6 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCNSyhZ-TjZz8TaOuObWfywuHCQp04GvUmxaxBveZR8GI2aBSKeVu1GeUef_zVvRBFBk6YvkbW-7GDT0Cnf8jLj2I38KZZZSLFEyXewl78zCxHY6_sfoLS1pikPVKQICio3wDkIKPu3ZwR1oFWfyEPZb6RlrEZmqSsSMnKAiFFEuE4-QlOFwdfMylhOp8214wGSv1WRzUpPPLncSusYF6o00eradiBuSiakLBTA4lWs96AeNdKlHgVPeucK_2bSp-HIMtN3E55wCNk">
</div>
</header>
<!-- Main Content Area -->
<main class="w-full max-w-md mt-16 px-gutter flex-1 flex flex-col items-center pt-8">
<!-- Break Value Display -->
<div class="w-full flex flex-col items-center mb-12">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-2">זמן הפסקה נוכחי</span>
<div class="flex items-baseline gap-2">
<div class="text-[64px] font-extrabold text-primary tracking-tighter tabular-nums" id="break-display">30</div>
<span class="font-headline-md text-headline-md text-on-surface-variant">דק׳</span>
</div>
</div>
<!-- Numeric Keypad Grid -->
<div class="w-full max-w-[320px] grid grid-cols-3 gap-4 mb-8">
<button class="keypad-button h-16 rounded-xl bg-surface-container-low border border-outline-variant/30 flex items-center justify-center font-headline-sm text-headline-sm text-on-surface transition-all" onclick="appendNum('1')">1</button>
<button class="keypad-button h-16 rounded-xl bg-surface-container-low border border-outline-variant/30 flex items-center justify-center font-headline-sm text-headline-sm text-on-surface transition-all" onclick="appendNum('2')">2</button>
<button class="keypad-button h-16 rounded-xl bg-surface-container-low border border-outline-variant/30 flex items-center justify-center font-headline-sm text-headline-sm text-on-surface transition-all" onclick="appendNum('3')">3</button>
<button class="keypad-button h-16 rounded-xl bg-surface-container-low border border-outline-variant/30 flex items-center justify-center font-headline-sm text-headline-sm text-on-surface transition-all" onclick="appendNum('4')">4</button>
<button class="keypad-button h-16 rounded-xl bg-surface-container-low border border-outline-variant/30 flex items-center justify-center font-headline-sm text-headline-sm text-on-surface transition-all" onclick="appendNum('5')">5</button>
<button class="keypad-button h-16 rounded-xl bg-surface-container-low border border-outline-variant/30 flex items-center justify-center font-headline-sm text-headline-sm text-on-surface transition-all" onclick="appendNum('6')">6</button>
<button class="keypad-button h-16 rounded-xl bg-surface-container-low border border-outline-variant/30 flex items-center justify-center font-headline-sm text-headline-sm text-on-surface transition-all" onclick="appendNum('7')">7</button>
<button class="keypad-button h-16 rounded-xl bg-surface-container-low border border-outline-variant/30 flex items-center justify-center font-headline-sm text-headline-sm text-on-surface transition-all" onclick="appendNum('8')">8</button>
<button class="keypad-button h-16 rounded-xl bg-surface-container-low border border-outline-variant/30 flex items-center justify-center font-headline-sm text-headline-sm text-on-surface transition-all" onclick="appendNum('9')">9</button>
<div class="h-16"></div>
<button class="keypad-button h-16 rounded-xl bg-surface-container-low border border-outline-variant/30 flex items-center justify-center font-headline-sm text-headline-sm text-on-surface transition-all" onclick="appendNum('0')">0</button>
<button class="keypad-button h-16 rounded-xl bg-surface-container-low border border-outline-variant/30 flex items-center justify-center text-on-surface transition-all" onclick="deleteNum()">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
<!-- Quick Presets -->
<div class="flex gap-3 mb-8">
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface font-label-lg text-label-lg active:scale-95 transition-transform" onclick="setValue('15')">15 דק׳</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface font-label-lg text-label-lg active:scale-95 transition-transform" onclick="setValue('30')">30 דק׳</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface font-label-lg text-label-lg active:scale-95 transition-transform" onclick="setValue('45')">45 דק׳</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface font-label-lg text-label-lg active:scale-95 transition-transform" onclick="setValue('60')">1 שעה</button>
</div>
</main>
<!-- Sticky Footer Actions -->
<footer class="fixed bottom-0 w-full p-gutter bg-surface-container-lowest/80 backdrop-blur-md">
<div class="max-w-md mx-auto flex flex-col gap-3">
<button class="w-full h-[56px] bg-primary text-on-primary rounded-xl font-label-lg text-label-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center" id="save-btn" onclick="localStorage.setItem('break_time', currentVal); window.location.href='{{DATA:SCREEN:SCREEN_98}}';">
                שמירת שינויים
            </button>
<button class="w-full h-[48px] text-primary font-label-lg text-label-lg flex items-center justify-center hover:bg-primary/5 rounded-xl transition-colors">
                ביטול
            </button>
</div>
</footer>
<script>
        let currentVal = '30';
        const display = document.getElementById('break-display');

        function updateDisplay() {
            display.innerText = currentVal || '0';
        }

        function appendNum(num) {
            if (currentVal === '0') currentVal = '';
            if (currentVal.length < 3) {
                currentVal += num;
                updateDisplay();
            }
        }

        function deleteNum() {
            currentVal = currentVal.slice(0, -1);
            if (currentVal === '') currentVal = '0';
            updateDisplay();
        }

        function setValue(val) {
            currentVal = val;
            updateDisplay();
        }

        // Simple button interaction feedback
        const saveBtn = document.getElementById('save-btn');
        saveBtn.addEventListener('click', () => {
            saveBtn.innerHTML = '<span class="material-symbols-outlined animate-spin mr-2">sync</span> שומר...';
            setTimeout(() => {
                saveBtn.innerHTML = '<span class="material-symbols-outlined mr-2">check</span> נשמר בהצלחה';
                saveBtn.classList.replace('bg-primary', 'bg-tertiary-container');
                setTimeout(() => {
                    saveBtn.innerHTML = 'שמירת שינויים';
                    saveBtn.classList.replace('bg-tertiary-container', 'bg-primary');
                }, 2000);
            }, 800);
        });
    </script>
</body></html>
