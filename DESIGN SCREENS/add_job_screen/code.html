<!DOCTYPE html>
<html class="light" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add/Edit Job</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#3B82F6", // Blue-500
            "primary-light": "#EFF6FF", // Blue-50
            "background-light": "#F9FAFB", // Gray-50
            "background-dark": "#111827", // Gray-900
            "text-light": "#1F2937", // Gray-800
            "text-dark": "#F9FAFB", // Gray-50
            "card-light": "#FFFFFF",
            "card-dark": "#1F2937", // Gray-800
          },
          fontFamily: {
            "display": ["Manrope", "Noto Sans", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.75rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24
    }
  </style>
<style>
    body {
      min-height: 100dvh;
      background-color: #EFF6FF;
    }
    .dark body {
      background-color: #0f1323;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary-light dark:bg-background-dark font-display text-text-light dark:text-text-dark">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="sticky top-0 z-10 bg-primary-light dark:bg-background-dark">
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-text-light dark:text-white flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-text-light dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">הוסף עבודה</h1>
<div class="flex w-12 items-center justify-end">
<button class="flex cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 text-red-500 gap-2 text-base font-bold leading-normal tracking-[0.015em] min-w-0 p-0">
<span class="material-symbols-outlined text-2xl">delete</span>
</button>
</div>
</div>
</div>
<main class="flex-1 px-4 py-6">
<div class="flex flex-col gap-4">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-zinc-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary border-none bg-card-light dark:bg-card-dark h-14 placeholder:text-zinc-500 dark:placeholder:text-zinc-400 p-4 text-base font-normal leading-normal" id="job-name" placeholder="שם העבודה" value="פיתוח אפליקציות"/>
<div class="grid grid-cols-2 gap-4">
<div class="bg-card-light dark:bg-card-dark rounded-xl p-4 flex flex-col items-center justify-center aspect-square text-center">
<span class="material-symbols-outlined text-4xl text-primary mb-2">payments</span>
<p class="text-sm font-medium text-zinc-600 dark:text-zinc-300">שכר שעתי</p>
<input class="form-input w-24 text-center bg-transparent border-0 focus:ring-0 p-0 text-text-light dark:text-text-dark text-2xl font-bold" type="text" value="₪75"/>
</div>
<div class="bg-card-light dark:bg-card-dark rounded-xl p-4 flex flex-col items-center justify-center aspect-square text-center">
<span class="material-symbols-outlined text-4xl text-primary mb-2">schedule</span>
<p class="text-sm font-medium text-zinc-600 dark:text-zinc-300">שעות נוספות אחרי</p>
<input class="form-input w-24 text-center bg-transparent border-0 focus:ring-0 p-0 text-text-light dark:text-text-dark text-2xl font-bold" type="text" value="8 שעות"/>
</div>
<div class="bg-card-light dark:bg-card-dark rounded-xl p-4 flex flex-col items-center justify-center aspect-square text-center">
<span class="material-symbols-outlined text-4xl text-primary mb-2">percent</span>
<p class="text-sm font-medium text-zinc-600 dark:text-zinc-300">אחוז ש"נ</p>
<input class="form-input w-20 text-center bg-transparent border-0 focus:ring-0 p-0 text-text-light dark:text-text-dark text-2xl font-bold" type="text" value="125%"/>
</div>
<div class="bg-card-light dark:bg-card-dark rounded-xl p-4 flex flex-col items-center justify-center aspect-square text-center">
<span class="material-symbols-outlined text-4xl text-primary mb-2">commute</span>
<p class="text-sm font-medium text-zinc-600 dark:text-zinc-300">נסיעות (קבוע)</p>
<input class="form-input w-24 text-center bg-transparent border-0 focus:ring-0 p-0 text-text-light dark:text-text-dark text-2xl font-bold" type="text" value="₪25"/>
</div>
<div class="bg-card-light dark:bg-card-dark rounded-xl p-4 flex flex-col items-center justify-center aspect-square text-center">
<span class="material-symbols-outlined text-4xl text-primary mb-2">free_breakfast</span>
<p class="text-sm font-medium text-zinc-600 dark:text-zinc-300">הפסקה אוטומטית</p>
<input class="form-input w-20 text-center bg-transparent border-0 focus:ring-0 p-0 text-text-light dark:text-text-dark text-2xl font-bold" type="text" value="30 דק'"/>
</div>
<div class="bg-card-light dark:bg-card-dark rounded-xl p-4 flex flex-col items-center justify-center aspect-square text-center">
<span class="material-symbols-outlined text-4xl text-primary mb-2">calendar_month</span>
<p class="text-sm font-medium text-zinc-600 dark:text-zinc-300">תחילת חודש</p>
<p class="text-2xl font-bold text-text-light dark:text-text-dark mt-1">1 לחודש</p>
</div>
<div class="bg-card-light dark:bg-card-dark rounded-xl p-4 flex flex-col items-center justify-center aspect-square text-center cursor-pointer">
<span class="material-symbols-outlined text-4xl text-primary mb-2">sick</span>
<p class="text-sm font-medium text-zinc-600 dark:text-zinc-300">ימי מחלה</p>
<p class="text-2xl font-bold text-text-light dark:text-text-dark mt-1">הגדר</p>
</div>
<div class="bg-card-light dark:bg-card-dark rounded-xl p-4 flex flex-col items-center justify-center aspect-square text-center">
<span class="material-symbols-outlined text-4xl text-primary mb-2">notifications_active</span>
<p class="text-sm font-medium text-zinc-600 dark:text-zinc-300">תזכורות</p>
<label class="relative inline-flex items-center cursor-pointer mt-2">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-zinc-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 dark:peer-focus:ring-blue-800 rounded-full peer dark:bg-zinc-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-zinc-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-zinc-600 peer-checked:bg-primary"></div>
</label>
</div>
</div>
</div>
<div class="h-24"></div>
</main>
<div class="fixed bottom-0 left-0 right-0 p-4 bg-primary-light dark:bg-background-dark border-t border-blue-200 dark:border-zinc-700">
<button class="w-full flex items-center justify-center rounded-xl h-14 bg-primary text-white text-base font-bold shadow-lg shadow-primary/30">שמור עבודה</button>
</div>
</div>

</body></html>
