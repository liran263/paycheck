<style>
        body {
            background-color: #faf9fe;
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
        }
        .glass-header {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-key:active {
            transform: scale(0.9);
            background-color: #e2dfff;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

<body class="text-on-surface">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-40 bg-surface/70 backdrop-blur-xl border-b border-white/10 shadow-sm flex justify-between items-center px-container-padding h-16">
<div class="flex items-center gap-4">
<button class="active:scale-95 duration-200 hover:opacity-80 transition-opacity p-2 rounded-full" onclick="window.history.back()">
<span class="material-symbols-outlined text-primary">arrow_forward</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">עריכת שכר שעתי</h1>
</div>
<div class="w-10 h-10 rounded-full bg-secondary-container/20 flex items-center justify-center overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_vnDduhZwziQX9iq4XMhDy7JHcvRy2WeH9w9lsQFl1eHcfDmrVtyPSds8Xt1DbsUVScke-yrv3EsI77XubD6425k6EndJsnxmC_nSL7QqFsvhPhHkJk2k1VRvwzRMg1nrcYdsO4uzhP7hURcMw2i-FsFB9EujaRbcpa2PE4wVwVj_iCpJY7yJSTeCduVk0HwvYzGj-MDEPA-Zt54KM9oUPDCQmPrYy4qg40R5EEIi-bJVoREW8WpfqXbLo2FHu7TLusrur-dC6q0">
</div>
</header>
<main class="pt-24 pb-32 px-container-padding max-w-md mx-auto min-h-screen flex flex-col">
<!-- Central Icon & Visual -->
<div class="flex flex-col items-center justify-center mb-xl">
<div class="relative w-32 h-32 mb-lg">
<div class="absolute inset-0 bg-primary/10 rounded-full animate-pulse"></div>
<img alt="Hourly Wage Icon" class="relative z-10 w-full h-full object-contain p-4" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAB2hs8LbPx1N0r0DmHNbCJMVbD0Fdimntenxxg5RkMdClcZieGCD-cVhp0jpxHwZX5U4RWZQf5wviTdjsGffxGmy8-OzrzABvxcpx8BE1v87nhbhP42BwevzwDpVpTrEFvmMIZL3gazbWzBWDMQzZp-4Py7RK_63irIpuIksUobae7y8DlNRTCHW3DMLrIwUo3yNo4Sl4X4aUDe6pTsJBoZH5gx2-RjHuD98UkS1yVgfuWGWDatnt-k_HF45yYE0Uz4Ln4bATYek4">
</div>
<p class="font-body-lg text-on-surface-variant text-center">הזן את התעריף החדש לשעה</p>
</div>
<!-- Main Input Container -->
<div class="bg-surface-container-lowest rounded-xl p-xl shadow-[0_8px_20px_rgba(0,64,255,0.04)] border border-[#E5E9F2] mb-xl">
<div class="flex flex-col items-center">
<div class="relative flex items-center justify-center w-full">
<span class="text-display font-display text-primary mr-2">₪</span>
<input class="w-full text-center bg-transparent border-none focus:ring-0 text-display font-display text-on-surface p-0 m-0" id="wageInput" readonly="" type="number" value="45">
</div>
<div class="h-1 w-24 bg-primary/20 rounded-full mt-4"></div>
</div>
</div>
<!-- Spacer for flow -->
<div class="flex-grow"></div>
<!-- Numeric Keypad -->
<div class="grid grid-cols-3 gap-md mb-xl">
<button class="active-key flex items-center justify-center h-16 rounded-xl bg-surface-container-high text-title-md font-title-md text-on-surface transition-all duration-150" onclick="appendNum('1')">1</button>
<button class="active-key flex items-center justify-center h-16 rounded-xl bg-surface-container-high text-title-md font-title-md text-on-surface transition-all duration-150" onclick="appendNum('2')">2</button>
<button class="active-key flex items-center justify-center h-16 rounded-xl bg-surface-container-high text-title-md font-title-md text-on-surface transition-all duration-150" onclick="appendNum('3')">3</button>
<button class="active-key flex items-center justify-center h-16 rounded-xl bg-surface-container-high text-title-md font-title-md text-on-surface transition-all duration-150" onclick="appendNum('4')">4</button>
<button class="active-key flex items-center justify-center h-16 rounded-xl bg-surface-container-high text-title-md font-title-md text-on-surface transition-all duration-150" onclick="appendNum('5')">5</button>
<button class="active-key flex items-center justify-center h-16 rounded-xl bg-surface-container-high text-title-md font-title-md text-on-surface transition-all duration-150" onclick="appendNum('6')">6</button>
<button class="active-key flex items-center justify-center h-16 rounded-xl bg-surface-container-high text-title-md font-title-md text-on-surface transition-all duration-150" onclick="appendNum('7')">7</button>
<button class="active-key flex items-center justify-center h-16 rounded-xl bg-surface-container-high text-title-md font-title-md text-on-surface transition-all duration-150" onclick="appendNum('8')">8</button>
<button class="active-key flex items-center justify-center h-16 rounded-xl bg-surface-container-high text-title-md font-title-md text-on-surface transition-all duration-150" onclick="appendNum('9')">9</button>
<button class="active-key flex items-center justify-center h-16 rounded-xl bg-surface-container-high text-title-md font-title-md text-on-surface transition-all duration-150" onclick="appendNum('.')">.</button>
<button class="active-key flex items-center justify-center h-16 rounded-xl bg-surface-container-high text-title-md font-title-md text-on-surface transition-all duration-150" onclick="appendNum('0')">0</button>
<button class="active-key flex items-center justify-center h-16 rounded-xl bg-surface-container-high text-on-surface transition-all duration-150" onclick="deleteLast()">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
<!-- Primary Action -->
<div class="fixed bottom-0 left-0 w-full p-container-padding bg-surface/70 backdrop-blur-xl border-t border-white/10">
<button class="w-full bg-primary text-on-primary font-title-md text-title-md h-14 rounded-xl shadow-lg active:scale-95 transition-transform duration-200" onclick="localStorage.setItem('hourly_wage', document.getElementById('wageInput').value); window.location.href='{{DATA:SCREEN:SCREEN_98}}';">
                שמור שינויים
            </button>
</div>
</main>
<!-- Success Feedback Overlay (Hidden by default) -->
<div class="fixed inset-0 z-50 bg-surface/80 backdrop-blur-md flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300" id="successOverlay">
<div class="bg-white rounded-3xl p-xl shadow-2xl flex flex-col items-center max-w-xs text-center">
<div class="w-20 h-20 bg-tertiary-container/20 text-tertiary rounded-full flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1">check_circle</span>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs">השכר עודכן!</h2>
<p class="font-body-lg text-on-surface-variant">השינויים נשמרו בהצלחה במערכת.</p>
</div>
</div>
<script>
        const wageInput = document.getElementById('wageInput');
        const successOverlay = document.getElementById('successOverlay');

        function appendNum(val) {
            let current = wageInput.value;
            // Prevent multiple dots
            if (val === '.' && current.includes('.')) return;
            // Limit to 2 decimal places
            if (current.includes('.') && current.split('.')[1].length >= 2) return;
            // Limit length
            if (current.length > 6) return;
            
            if (current === '0' && val !== '.') {
                wageInput.value = val;
            } else {
                wageInput.value += val;
            }
        }

        function deleteLast() {
            let current = wageInput.value;
            if (current.length > 0) {
                wageInput.value = current.slice(0, -1);
            }
            if (wageInput.value === '') wageInput.value = '0';
        }

        function saveChanges() {
            successOverlay.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                successOverlay.classList.add('opacity-0', 'pointer-events-none');
                // Potential navigation back after save
                // window.history.back();
            }, 2000);
        }
    </script>
</body></html>
