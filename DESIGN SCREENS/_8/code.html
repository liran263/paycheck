<script>
        function setTheme(theme) {
            const lightBtn = document.getElementById('light-btn');
            const darkBtn = document.getElementById('dark-btn');
            const lightCheck = document.getElementById('light-check');
            const darkCheck = document.getElementById('dark-check');

            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                darkBtn.classList.add('border-primary');
                darkBtn.classList.remove('border-transparent');
                lightBtn.classList.remove('border-primary');
                lightBtn.classList.add('border-transparent');
                darkCheck.classList.remove('hidden');
                lightCheck.classList.add('hidden');
                
                // Styling text classes manually for the dark mode button
                darkBtn.querySelector('span').classList.replace('text-on-surface-variant', 'text-primary');
                lightBtn.querySelector('span').classList.replace('text-primary', 'text-on-surface-variant');
            } else {
                document.documentElement.classList.remove('dark');
                lightBtn.classList.add('border-primary');
                lightBtn.classList.remove('border-transparent');
                darkBtn.classList.remove('border-primary');
                darkBtn.classList.add('border-transparent');
                lightCheck.classList.remove('hidden');
                darkCheck.classList.add('hidden');

                lightBtn.querySelector('span').classList.replace('text-on-surface-variant', 'text-primary');
                darkBtn.querySelector('span').classList.replace('text-primary', 'text-on-surface-variant');
            }
        }

        // Ripple / Click interaction simulation
        document.querySelectorAll('button, label').forEach(elem => {
            elem.addEventListener('mousedown', function() {
                this.classList.add('opacity-80');
            });
            elem.addEventListener('mouseup', function() {
                this.classList.remove('opacity-80');
            });
        });
    </script>
