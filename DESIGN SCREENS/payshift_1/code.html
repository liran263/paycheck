<!DOCTYPE html><html dir="rtl" lang="he"><head>

            -webkit-tap-highlight-color: transparent;
        }
        .glass-effect {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.8);

                      "on-primary-fixed": "#001a41",
                      "secondary-fixed-dim": "#bec8d1",
                      "on-surface": "#181c23",
                      "primary-fixed-dim": "#adc6ff",
                      "error-container": "#ffdad6",
                      "outline-variant": "#c1c6d7",
                      "on-primary": "#ffffff",

<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-background border-b border-outline-variant dark:border-outline docked full-width top-0 z-40 fixed">
<div class="flex items-center justify-between px-gutter w-full h-16">
<button class="hover:bg-surface-container-low transition-colors active:scale-95 duration-100 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed">arrow_forward</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary dark:text-primary-fixed">עריכת פרופיל</h1>
<button class="text-primary font-bold hover:bg-surface-container-low transition-colors active:scale-95 duration-100 px-4 py-2 rounded-lg font-label-lg text-label-lg">
                שמור
            </button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-20 pb-32 px-gutter max-w-lg mx-auto w-full">
<!-- Profile Picture Section -->
<section class="flex flex-col items-center mb-xl">
<div class="relative group">
<div class="w-32 h-32 rounded-full overflow-hidden border-4 border-white shadow-sm">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A professional headshot of a smiling young businessman with a clean beard and styled hair. The background is a soft, blurred corporate office environment with natural sunlight and cool blue tones. The photography is sharp and modern, emphasizing clarity and professionalism in a high-key light-mode aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAd2qG_bKdcIXEZW89X1fvqetB7u7qcEo62D_UeUNF835uryI0nlV6cNgKwFZQBAV7EsmyybU0B-rdaYH0YHHm7NY9pVSJs-1fdcCBircCPTTLkKdMkjKWrAH4D2yGgqpY5v_ykEqtIZKU2j3pw6IaW-mr2vjHl_VZXVLxUzTocNmqHDNWDs9ans_9ZKgRMNOnoW8eMXdjHDQP1GbTX_ovEsQwzY5FycjnkJ4BtrYMsSFPSffi5dFafwAy-fh5BIPXkhxXTwP1HVnY">
</div>
<button class="absolute bottom-0 left-0 bg-primary text-on-primary p-2 rounded-full shadow-lg border-2 border-white hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
</div>
<p class="mt-md font-label-sm text-label-sm text-on-surface-variant">החלף תמונת פרופיל</p>
</section>
<!-- Form Fields -->
<form class="space-y-lg">
<!-- First Name Field -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1" for="first_name">שם פרטי</label>
<div class="relative">
<input class="w-full bg-white border border-outline-variant rounded-xl px-4 py-3 font-body-lg text-body-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-outline" id="first_name" placeholder="הכנס שם פרטי" type="text">
</div>
</div>
<!-- Last Name Field -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1" for="last_name">שם משפחה</label>
<div class="relative">
<input class="w-full bg-white border border-outline-variant rounded-xl px-4 py-3 font-body-lg text-body-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-outline" id="last_name" placeholder="הכנס שם משפחה" type="text">
</div>
</div>
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1" for="email">אימייל</label>
<div class="relative">
<input class="w-full bg-white border border-outline-variant rounded-xl px-4 py-3 font-body-lg text-body-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-outline" id="email" placeholder="example@payshift.co.il" type="email">
</div>
</div>
<!-- Additional Decorative Card -->
<div class="mt-xl p-md bg-surface-container-low rounded-xl border border-outline-variant/30 flex items-center gap-md">
<div class="bg-primary/10 p-2 rounded-lg text-primary">
<span class="material-symbols-outlined">verified_user</span>
</div>
<div>
<h3 class="font-label-lg text-label-lg text-on-surface">פרטי חשבון מאובטחים</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant">המידע שלך מוצפן ומאובטח לפי תקני PayShift</p>
</div>
</div>
</form>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface dark:bg-surface-container-lowest shadow-sm rounded-t-xl">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">timer</span>
<span class="font-label-sm text-label-sm">Now</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">work</span>
<span class="font-label-sm text-label-sm">Jobs</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">schedule</span>
<span class="font-label-sm text-label-sm">Shifts</span>
</a>
</nav>
<script>
        // Simple micro-interaction for input fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Save button feedback
        const saveBtn = document.querySelector('header button:last-child');
        saveBtn.addEventListener('click', () => {
            const originalText = saveBtn.innerText;
            saveBtn.innerText = 'שומר...';
            setTimeout(() => {
                saveBtn.innerText = 'נשמר!';
                setTimeout(() => {
                    saveBtn.innerText = originalText;
                }, 2000);
            }, 800);
        });
    </script>
</body></html>
