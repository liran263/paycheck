<!-- Decorative Bottom Spacer to prevent overlap with sticky footer -->
<div class="h-32 w-full"></div>
<script>
        // Simple micro-interaction for date selection
        const dates = document.querySelectorAll('.calendar-grid button');
        const display = document.getElementById('selected-display');
        
        dates.forEach(btn => {
            btn.addEventListener('click', () => {
                // Clear previous selection
                dates.forEach(d => {
                    d.classList.remove('bg-primary', 'text-white', 'selected-date');
                    d.classList.add('text-on-surface-variant', 'hover:bg-surface-container-low');
                });
                
                // Set new selection
                btn.classList.add('bg-primary', 'text-white', 'selected-date');
                btn.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-low');
                
                // Update display
                const day = btn.innerText;
                display.innerText = `${day} במאי, 2024`;
                
                // Haptic-like visual feedback
                btn.classList.add('scale-90');
                setTimeout(() => btn.classList.remove('scale-90'), 100);
            });
        });
    </script>
